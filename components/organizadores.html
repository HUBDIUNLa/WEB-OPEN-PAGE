


<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizadores de la Jornada</title>

    <style>
    :root {
        --bg-light: #f9f9f9;
        --text-dark: #222;
        --border-color: #e0e0e0;
    }

    .jornada-organizadores {
        padding: 80px 20px;
        max-width: 1200px;
        margin: 0 auto;
        text-align: center;
        position: relative;
        overflow: hidden; /* Evita que las animaciones generen scroll horizontal */
    }

    .section-title {
        font-size: 1.8rem;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 60px;
        color: #333;
        position: relative;
        z-index: 2;
    }

    /* Contenedor Principal de Logos */
    .logos-grid {
        display: flex;
        flex-direction: column;
        gap: 50px;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 2;
    }

    .logos-principales {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 60px;
        flex-wrap: wrap;
    }

    .logos-secundarios {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 40px;
        flex-wrap: wrap;
        margin-top: 20px;
    }

    .logo-card {
        background: #ffffff;
        padding: 20px;
        border-radius: none;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
        border: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.3s ease;
    }

    .logo-card:hover {
        transform: translateY(-3px);
    }

    .logo-main img {
        height: 120px;
        width: auto;
        object-fit: contain;
    }

    .logo-sub img {
        height: 90px;
        width: auto;
        object-fit: contain;
    }

    /* ===================================================
       NUEVOS BLOQUES DECORATIVOS CHICOS CON ANIMACIÓN
       =================================================== */
    
    /* Clase base para los bloques flotantes */
    .bloque-decorativo {
        position: absolute;
        pointer-events: none; /* No interfieren con los clics en la pantalla */
        z-index: 1;
        object-fit: contain;
        /* Animación: cae en 1.5s y luego se queda flotando/rotando en loop */
        animation: caerDesdeArriba 1.6s cubic-bezier(0.25, 1, 0.5, 1) forwards, 
                  balanceoRuedo 6s ease-in-out infinite alternate;
        animation-delay: 0.2s;
        opacity: 0; /* Empieza invisible hasta que cae */
    }

    /* Posiciones individuales, tamaños reducidos y descalces de tiempo */
    .b-1 {
        top: 5%;
        left: 3%;
        width: 75px;
        animation-delay: 0.1s;
    }

    .b-2 {
        top: 45%;
        left: 6%;
        width: 60px;
        animation-delay: 0.4s;
    }

    .b-3 {
        top: 12%;
        right: 4%;
        width: 80px;
        animation-delay: 0.25s;
    }

    .b-4 {
        bottom: 8%;
        right: 5%;
        width: 95px;
        animation-delay: 0.5s;
    }

    /* ===================================================
       KEYFRAMES DE LAS ANIMACIONES (Caída y Rodamiento)
       =================================================== */
    
    /* 1. Animación de entrada: Cae desde arriba y frena en su lugar */
    @keyframes caerDesdeArriba {
        0% {
            transform: translateY(-200px) rotate(-45deg);
            opacity: 0;
        }
        100% {
            transform: translateY(0) rotate(0deg);
            opacity: 0.85; /* Opacidad sutil para que no compita tanto */
        }
    }

    /* 2. Animación infinita: Simula que flota y rueda sutilmente hacia los lados */
    @keyframes balanceoRuedo {
        0% {
            transform: translateY(0) rotate(0deg);
        }
        50% {
            transform: translateY(-10px) rotate(8deg); /* Sube un poquito y rueda a la derecha */
        }
        100% {
            transform: translateY(4px) rotate(-6deg); /* Baja un poquito y rueda a la izquierda */
        }
    }

    /* Ajustes para pantallas chicas */
    @media (max-width: 768px) {
        .jornada-organizadores {
            padding: 50px 15px;
        }
        .logos-principales, .logos-secundarios {
            gap: 25px;
        }
        .logo-main img {
            height: 90px;
        }
        .logo-sub img {
            height: 70px;
        }
        /* Bloques todavía más chicos en celulares para no tapar texto */
        .bloque-decorativo {
            width: 45px !important;
            opacity: 0.4 !important;
        }
        .b-1 { left: 1%; top: 2%; }
        .b-2 { left: 2%; top: 70%; }
        .b-3 { right: 1%; top: 5%; }
        .b-4 { right: 2%; bottom: 2%; }
    }
</style>

<section class="jornada-organizadores">
    
    <img src="BLOQUE1.png" alt="Detalle Geométrico" class="bloque-decorativo b-1">
    <img src="BLOQUE3.png" alt="Detalle Geométrico" class="bloque-decorativo b-2">
    <img src="BLOQUE4.png" alt="Detalle Geométrico" class="bloque-decorativo b-3">
    <img src="JDFDBLOQUESSINFONDO.png" alt="Mosaico JDFD" class="bloque-decorativo b-4">

    <h2 class="section-title">Organizan la Jornada</h2>

    <div class="logos-grid">
        
        <div class="logos-principales">
            <div class="logo-card logo-main">
                <img src="unla logo rrss.jpg" alt="UNLa">
            </div>
            <div class="logo-card logo-main">
                <img src="lad sin borde negro.png" alt="LAD">
            </div>
        </div>

        <div class="logos-secundarios">
            <div class="logo-card logo-sub">
                <img src="logo di.jpg" alt="DI UNLa">
            </div>
            <div class="logo-card logo-sub">
                <img src="logo HyA.jpg" alt="HyA UNLa">
            </div>
            <div class="logo-card logo-sub">
                <img src="etfdunla_logo.jpg" alt="ETFD UNLa">
            </div>
        </div>

    </div>

</section>


</body>
</html>
